apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: aiops-platform
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "*"
    helm:
      valuesObject:
        grafana:
          adminPassword: "AIOps@2026!"
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki.logging.svc.cluster.local:3100
              access: proxy
              isDefault: false
        prometheus:
          prometheusSpec:
            retention: "7d"
        alertmanager:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # fixes: CRD annotations too long (>256KB limit)
      - Replace=true           # fixes: CRD replace instead of patch
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 3m
  # Tell ArgoCD to ignore CRD differences that cause false OutOfSync
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /status
        - /metadata/annotations