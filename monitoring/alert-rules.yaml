apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: aiops-platform-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
  - name: node.rules
    rules:
    - alert: NodeCPUHigh
      expr: 100 - (avg by(node) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Node {{ $labels.node }} CPU high"
        description: "CPU usage is {{ $value | humanize }}% for 5 minutes"

    - alert: NodeMemoryHigh
      expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Node {{ $labels.node }} memory high"
        description: "Memory usage is {{ $value | humanize }}%"

    - alert: NodeDiskWillFillIn4Hours
      expr: predict_linear(node_filesystem_avail_bytes{mountpoint="/"}[1h], 4*3600) < 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Node {{ $labels.node }} disk will fill in 4 hours"
        description: "Based on current trend, disk will be full in 4 hours"

  - name: pod.rules
    rules:
    - alert: PodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 3
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} crash looping"
        description: "Pod has restarted {{ $value | humanize }} times in 15 minutes"

    - alert: PodNotReady
      expr: kube_pod_status_ready{condition="true"} == 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"
        description: "Pod has been not ready for 5 minutes"

  - name: aiops.rules
    rules:
    - alert: NodeMemoryWillExhaustIn2Hours
      expr: predict_linear(node_memory_MemAvailable_bytes[30m], 2*3600) < 0
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Node {{ $labels.node }} memory predicted to exhaust in 2 hours"
        description: "Based on current consumption trend, memory will be exhausted"

    - alert: ClusterNodeCountLow
      expr: count(kube_node_status_condition{condition="Ready",status="true"}) < 1
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "AKS cluster has no ready nodes"
        description: "Cluster node count dropped below 1"
