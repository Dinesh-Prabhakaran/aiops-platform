# =============================================================================
# PODINFO — sample application for AIOps demonstration
#
# Purpose: a real application to monitor, break, and auto-heal.
# Without a running app, AIOps auto-remediation has nothing to act on.
#
# podinfo is purpose-built for K8s demos:
#   - exposes /healthz and /readyz endpoints (Prometheus can scrape these)
#   - /panic endpoint intentionally crashes the pod (for AIOps demo)
#   - lightweight: 64MB memory, negligible CPU
#   - used by Flux and ArgoCD in their own documentation
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: apps
  labels:
    purpose: demo
    managed-by: argocd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: podinfo
  namespace: apps
  labels:
    app: podinfo
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: podinfo
  template:
    metadata:
      labels:
        app: podinfo
      annotations:
        # Prometheus will scrape metrics from this pod automatically
        prometheus.io/scrape: "true"
        prometheus.io/port: "9898"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: podinfo
        image: stefanprodan/podinfo:6.7.0
        ports:
        - containerPort: 9898
          name: http
        - containerPort: 9999
          name: grpc
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        # Liveness probe — K8s restarts pod if this fails
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9898
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        # Readiness probe — pod removed from service if not ready
        readinessProbe:
          httpGet:
            path: /readyz
            port: 9898
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: podinfo
  namespace: apps
  labels:
    app: podinfo
spec:
  selector:
    app: podinfo
  ports:
  - name: http
    port: 9898
    targetPort: 9898
---
# ServiceMonitor — tells Prometheus to scrape podinfo metrics
# This is the K8s-native way to add a new scrape target
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: podinfo
  namespace: apps
  labels:
    release: kube-prometheus-stack   # must match Prometheus selector
spec:
  selector:
    matchLabels:
      app: podinfo
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
