# =============================================================================
# ARGOCD APPLICATION — alert-rules
#
# Deploys PrometheusRule from platform/monitoring/alert-rules.yaml.
# Separated from the Helm chart Application so alert rules can be
# updated independently without re-syncing the entire Prometheus stack.
#
# sync-wave "3" = deploy after Prometheus CRDs exist (wave 1)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alert-rules
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: aiops-platform
    app.kubernetes.io/component: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/Dinesh-Prabhakaran/aiops-platform.git
    targetRevision: main
    path: platform/monitoring
    directory:
      include: "alert-rules.yaml"   # only sync the alert rules, not helmrelease.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
