# =============================================================================
# ARGOCD APPLICATION — kube-prometheus-stack
#
# Deploys Prometheus + Grafana + Alertmanager from the Helm chart.
# Values come from platform/monitoring/helmrelease.yaml in this repo.
# Alert rules come from platform/monitoring/alert-rules.yaml.
#
# sync-wave "1" = deploy first (before apps that need monitoring)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: aiops-platform
    app.kubernetes.io/component: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "*"
    helm:
      valueFiles: []
      valuesObject:
        grafana:
          adminPassword: "AIOps@2026!"
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki.logging.svc.cluster.local:3100
              access: proxy
              isDefault: false
        prometheus:
          prometheusSpec:
            retention: "7d"
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelector: {}
            serviceMonitorNamespaceSelector: {}
            ruleSelectorNilUsesHelmValues: false
            ruleSelector: {}
            ruleNamespaceSelector: {}
        alertmanager:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /status
        - /metadata/annotations
