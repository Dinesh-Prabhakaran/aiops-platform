apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: aiops-platform
    app.kubernetes.io/component: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "*"
    helm:
      valuesObject:
        grafana:
          adminPassword: "AIOps@2026!"
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki.logging.svc.cluster.local:3100
              access: proxy
              isDefault: false
        prometheus:
          prometheusSpec:
            retention: "7d"
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelector: {}
            serviceMonitorNamespaceSelector: {}
            ruleSelectorNilUsesHelmValues: false
            ruleSelector: {}
            ruleNamespaceSelector: {}
        alertmanager:
          enabled: true
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['alertname', 'namespace']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 1h
              receiver: 'default'
              routes:
              # Route PodCrashLooping to Argo Events for auto-remediation
              - matchers:
                - alertname =~ "KubePodCrashLooping|PodCrashLooping"
                receiver: argo-events-webhook
                group_wait: 30s
                repeat_interval: 5m
            receivers:
            - name: 'default'
            - name: 'argo-events-webhook'
              webhook_configs:
              - url: 'http://aiops-webhook-eventsource-svc.argo-events.svc.cluster.local:12000/aiops-alerts'
                send_resolved: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /status
        - /metadata/annotations