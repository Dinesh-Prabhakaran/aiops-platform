# =============================================================================
# ARGOCD ROOT APPLICATION — App of Apps pattern
#
# This is the single bootstrap command. Apply this once and ArgoCD
# discovers everything else automatically by reading the applications/
# directory in this repo.
#
# Plain English:
#   This Application tells ArgoCD: "watch the argocd/applications/
#   directory in the aiops-platform repo. For every yaml file you find
#   there, create an ArgoCD Application." Those child Applications
#   then deploy Prometheus, Loki, podinfo etc.
#
# Adding a new tool:
#   1. Add manifest files to platform/ or apps/
#   2. Add an Application yaml to argocd/applications/platform/ or apps/
#   3. Push to Git
#   4. ArgoCD picks it up automatically — no manual kubectl needed
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiops-platform-root
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: aiops-platform
    app.kubernetes.io/component: root
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Dinesh-Prabhakaran/aiops-platform.git
    targetRevision: main
    path: argocd/applications   # watches ALL subdirs: platform/ and apps/
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
