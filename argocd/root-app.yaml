# =============================================================================
# ARGOCD ROOT APPLICATION — App of Apps pattern
#
# Bootstrap entry point. Apply once, ArgoCD manages everything else.
# Watches argocd/applications/ recursively — picks up platform/ and apps/ subdirs.
#
# Adding a new tool:
#   1. Add manifests to platform/<tool>/ or apps/<tool>/
#   2. Add ArgoCD Application to argocd/applications/platform/ or apps/
#   3. git push — ArgoCD deploys automatically
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiops-platform-root
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: aiops-platform
    app.kubernetes.io/component: root
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Dinesh-Prabhakaran/aiops-platform.git
    targetRevision: main
    path: argocd/applications
    directory:
      recurse: true    # recurse into platform/ and apps/ subdirectories
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
