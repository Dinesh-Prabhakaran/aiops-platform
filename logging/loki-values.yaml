# Loki stack — lightweight log aggregation for K8s
# Replaces ELK for cloud-native environments
# Grafana datasource added automatically via this chart

loki:
  auth_enabled: false          # single-tenant (fine for lab/AIOps platform)
  commonConfig:
    replication_factor: 1      # single node — increase for production HA
  storage:
    type: filesystem           # local storage — use Azure Blob for production

singleBinary:
  replicas: 1                  # single instance (cost control for lab)
  persistence:
    enabled: true
    size: 10Gi                 # 10GB log storage

# Promtail — the log collector (like Filebeat in ELK)
# Runs as DaemonSet — one pod per node, collects all container logs
promtail:
  enabled: true
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push

# Grafana datasource — auto-wires Loki into your existing Grafana
grafana:
  enabled: false               # already have Grafana from kube-prometheus-stack
  sidecar:
    datasources:
      enabled: true
