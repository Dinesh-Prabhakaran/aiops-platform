# =============================================================================
# RBAC — permissions for the auto-remediation workflow
#
# The workflow needs permission to:
#   - get/list pods (to find the crashed pod)
#   - delete pods (to restart them — K8s recreates deleted pods)
#   - get events (to check what happened)
#   - create pods (Argo Workflows needs this to run workflow steps)
#
# Principle of least privilege: only the permissions needed, nothing more.
# Scoped to argo-events and apps namespaces only.
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiops-remediation
  namespace: argo-events
  labels:
    app.kubernetes.io/part-of: aiops-platform
    app.kubernetes.io/component: auto-remediation
---
# Role in argo-events namespace — run workflows
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aiops-remediation
  namespace: argo-events
rules:
- apiGroups: ["argoproj.io"]
  resources: ["workflows", "workflowtemplates"]
  verbs: ["get", "list", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["pods", "pods/log", "events"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aiops-remediation
  namespace: argo-events
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aiops-remediation
subjects:
- kind: ServiceAccount
  name: aiops-remediation
  namespace: argo-events
---
# Role in apps namespace — remediate podinfo
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aiops-remediation
  namespace: apps
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "events"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aiops-remediation
  namespace: apps
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aiops-remediation
subjects:
- kind: ServiceAccount
  name: aiops-remediation
  namespace: argo-events
