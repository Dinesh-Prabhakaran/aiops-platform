apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiops-remediation
  namespace: argo-events
  labels:
    app.kubernetes.io/part-of: aiops-platform
    app.kubernetes.io/component: auto-remediation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aiops-remediation
  namespace: argo-events
rules:
- apiGroups: ["argoproj.io"]
  resources: ["workflows", "workflowtemplates", "workflowtaskresults"]
  verbs: ["get", "list", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["pods", "pods/log", "events"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aiops-remediation
  namespace: argo-events
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aiops-remediation
subjects:
- kind: ServiceAccount
  name: aiops-remediation
  namespace: argo-events
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aiops-remediation
  namespace: apps
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "events"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aiops-remediation
  namespace: apps
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aiops-remediation
subjects:
- kind: ServiceAccount
  name: aiops-remediation
  namespace: argo-events