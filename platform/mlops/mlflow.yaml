# =============================================================================
# MLFLOW TRACKING SERVER
#
# Uses bitnami/mlflow image which includes psycopg2 and azure-storage-blob
# pre-installed — no missing dependency issues.
#
# Backend store:   PostgreSQL (experiment metadata)
# Artifact store:  Azure Blob Storage (model files)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlops
  labels:
    app: mlflow
    part-of: mlops-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      initContainers:
      - name: install-deps
        image: python:3.10-slim
        command:
        - sh
        - -c
        - |
          pip install --quiet mlflow psycopg2-binary azure-storage-blob azure-identity && \
          cp -r /usr/local/lib/python3.10/site-packages /mnt/site-packages/
        volumeMounts:
        - name: site-packages
          mountPath: /mnt/site-packages
      containers:
      - name: mlflow
        image: python:3.10-slim
        ports:
        - containerPort: 5000
          name: http
        command:
        - sh
        - -c
        - |
          export PYTHONPATH=/mnt/site-packages
          python -m mlflow server \
            --host=0.0.0.0 \
            --port=5000 \
            --backend-store-uri=$(DATABASE_URL) \
            --default-artifact-root=$(ARTIFACT_ROOT) \
            --serve-artifacts
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: mlflow-postgres-secret
              key: DATABASE_URL
        - name: ARTIFACT_ROOT
          value: "wasbs://mlflow-artifacts@samlflowdp001.blob.core.windows.net/"
        - name: AZURE_STORAGE_ACCOUNT
          value: "samlflowdp001"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: site-packages
          mountPath: /mnt/site-packages
      volumes:
      - name: site-packages
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlops
  labels:
    app: mlflow
spec:
  selector:
    app: mlflow
  ports:
  - name: http
    port: 5000
    targetPort: 5000
