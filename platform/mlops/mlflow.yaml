# =============================================================================
# MLFLOW TRACKING SERVER
#
# The central MLflow server that:
#   - Stores experiment metadata in PostgreSQL
#   - Stores model artifacts in Azure Blob Storage
#   - Exposes web UI on port 5000
#
# Data scientists point their Python SDK at this server:
#   mlflow.set_tracking_uri("http://mlflow.mlops.svc.cluster.local:5000")
#
# Artifact store uses Azure Blob Storage (wasbs://) via managed identity.
# No storage account key needed — AKS kubelet identity has
# Storage Blob Data Contributor role on the storage account.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlops
  labels:
    app: mlflow
    part-of: mlops-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.14.1
        ports:
        - containerPort: 5000
          name: http
        command:
        - mlflow
        - server
        - --host=0.0.0.0
        - --port=5000
        - --backend-store-uri=$(DATABASE_URL)
        - --default-artifact-root=$(ARTIFACT_ROOT)
        - --serve-artifacts
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: mlflow-postgres-secret
              key: DATABASE_URL
        - name: ARTIFACT_ROOT
          value: "wasbs://mlflow-artifacts@samlflowdp001.blob.core.windows.net/"
        - name: AZURE_STORAGE_ACCOUNT
          value: "samlflowdp001"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlops
  labels:
    app: mlflow
spec:
  selector:
    app: mlflow
  ports:
  - name: http
    port: 5000
    targetPort: 5000
